name: Merge Dependabot PR

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - run: ${{ tojson(github) }}
        shell: cat {0}

  merge-dependabot-pr:
    if: >-
      github.repository == 'kt-npm-modules/svelte-adapter-azure-swa' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - id: app-token
        uses: kt-workflows/actions/create-github-app-token@main
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
          configure-git: false

      - id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          pr_url="$(gh pr list \
            --repo "$REPO" \
            --state open \
            --base main \
            --head "$HEAD_BRANCH" \
            --app dependabot \
            --json url \
            --jq '.[0].url')"

          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Merge
        if: steps.pr.outputs.url != '' && steps.pr.outputs.url != 'null'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --squash --delete-branch "${{ steps.pr.outputs.url }}"
