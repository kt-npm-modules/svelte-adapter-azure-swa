name: CI-SWA

on:
  workflow_call:
    inputs:
      matrix-node-version:
        required: true
        type: string
      cache-reset:
        required: false
        type: boolean

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: true
  DEFAULT_INSTALL_SCRIPT: npm ci && npm exec playwright install
  PUBLIC_SWA: false
  CI: true
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

permissions:
  contents: read # to fetch code (actions/checkout)
  pull-requests: write # to create comments (actions/github-script)
  actions: write # to create a comment (actions/github-script)

jobs:
  config:
    environment: development
    runs-on: ubuntu-latest
    outputs:
      install-script: ${{ steps.install-script.outputs.result }}
      azure: ${{ steps.azure.outputs.result }}
      concurrency-group: ${{ steps.concurrency-group.outputs.result }}
    steps:
      - id: install-script
        run: |
          echo "result=$DEFAULT_INSTALL_SCRIPT" >> "$GITHUB_OUTPUT"

      # Check that it's a push into the default branch
      - id: main-push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Push to main branch detected."
          echo "github.ref: ${{ github.ref }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "result=true" >> "$GITHUB_OUTPUT"
        working-directory: '.'

      # Check that it's a push into the contribution branch
      - id: contribution-push
        if: github.event_name == 'push' && github.ref == 'refs/heads/contribution'
        run: |
          echo "Push to contribution branch detected."
          echo "github.ref: ${{ github.ref }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "result=true" >> "$GITHUB_OUTPUT"
        working-directory: '.'

      # Check that it's a pull request into the default branch from within the same organization
      - id: pr-to-main
        if: |
          steps.main-push.outputs.result != 'true' && steps.contribution-push.outputs.result != 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.base.ref == github.event.repository.default_branch &&
          github.event.pull_request.head.repo.owner.login == github.event.repository.owner.login
        run: |
          echo "Pull request into main branch detected from the same organization."
          echo "github.event.pull_request.base.ref: ${{ github.event.pull_request.base.ref }}"
          echo "github.event.repository.default_branch: ${{ github.event.repository.default_branch }}"
          echo "github.event.pull_request.head.repo.owner.login: ${{ github.event.pull_request.head.repo.owner.login }}"
          echo "github.event.repository.owner.login: ${{ github.event.repository.owner.login }}"
          echo "result=true" >> "$GITHUB_OUTPUT"
        working-directory: '.'

      # Compute Azure SWA concurrency group:
      # - trusted pushes to main/contribution share one production lane
      # - internal PRs to main use separate preview lanes
      - id: concurrency-group
        if: |
          ${{ steps.main-push.outputs.result == 'true' || steps.contribution-push.outputs.result == 'true' || steps.pr-to-main.outputs.result == 'true' }}
        run: |
          if [[ "${{ steps.main-push.outputs.result }}" == 'true' || "${{ steps.contribution-push.outputs.result }}" == 'true' ]]; then
            GROUP="swa-azure-${{ github.repository }}-${{ github.workflow }}-production"
            echo "Trusted push detected. Using shared production deploy lane."
          else
            GROUP="swa-azure-${{ github.repository }}-${{ github.workflow }}-preview-${{ github.ref }}"
            echo "Internal PR detected. Using preview deploy lane."
          fi

          echo "group=$GROUP"
          echo "result=$GROUP" >> "$GITHUB_OUTPUT"
        working-directory: '.'

      # Check if AZURE_STATIC_WEB_APPS_API_TOKEN is set
      - id: azure
        if: ${{ steps.main-push.outputs.result == 'true' || steps.contribution-push.outputs.result == 'true' || steps.pr-to-main.outputs.result == 'true' }}
        run: |
          if [[ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ]]; then
            echo "Deploy token not set. Skipping deployment."
            echo "result=false" >> "$GITHUB_OUTPUT"
          else
            echo "Deploy token is set. Proceeding with deployment."
            echo "result=true" >> "$GITHUB_OUTPUT"
          fi
        working-directory: '.'

  cli:
    needs: config
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJson(inputs.matrix-node-version) }}
    env:
      NODE_ENV: development # Avoid uploadig source maps to sentry
      PUBLIC_SWA: true
      COVERAGE_DIR: coverage-swa-node${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6

      - uses: kt-workflows/actions/npm-run-script@main
        with:
          node-version: ${{ matrix.node-version }}
          cache-reset: ${{ inputs.cache-reset }}
          install-script: ${{ needs.config.outputs.install-script }}
          run-script: |
            npm run test:swa --prefix ./tests/demo
            node ./tests/coverage/mcr-report-swa.mjs
            mv coverage-swa "${COVERAGE_DIR}"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.COVERAGE_DIR }}
          path: ${{ env.COVERAGE_DIR }}
          if-no-files-found: error

  azure:
    needs: config
    if: ${{ needs.config.outputs.azure == 'true' }}
    environment: development
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJson(inputs.matrix-node-version) }}
      max-parallel: 1
    # Deploy to the same environment and wait for the previous job to finish, if we have more than one node version to test
    concurrency:
      group: ${{ needs.config.outputs.concurrency-group }}
      cancel-in-progress: false
    # outputs:
    #   base-url: ${{ steps.build-deploy.outputs.static_web_app_url }}
    env:
      NODE_API_RUNTIME_MAJOR: ${{ matrix.node-version }}
      NODE_API_RUNTIME: node:${{ matrix.node-version }}
    steps:
      - id: app-token
        uses: kt-workflows/actions/create-github-app-token@main
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
          configure-git: false
          # Default to github token if secrets are not provided
          default-to-github-token: true

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: kt-workflows/actions/npm-run-script@main
        with:
          node-version: ${{ matrix.node-version }}
          cache-reset: ${{ inputs.cache-reset }}
          install-script: ${{ needs.config.outputs.install-script }}
          # Run the build script and install the dependencies for the built api of the demo app
          # We build the app ourselves, otherwise the azure swa action will build it for us and it will take a very long time
          # For example: with build ourselves it takes about 1:30-2:00 minutes to build and deploy
          # With azure swa action it takes about 3:50 (or longer) minutes to build and deploy
          # Additionally, the azure swa action will occasionaly fail on determining the environment step (this step takes a long time)
          # Overall CI workflow reduced from about 5:00 minutes to about 2:30 minutes
          run-script: |
            npm run build --prefix ./tests/demo
            echo "############################################################################"
            cat ./tests/demo/build/static/staticwebapp.config.json
            echo "############################################################################"
            # Custom API directory
            cat ./tests/demo/func/package.json
            echo "############################################################################"
            npm install --omit=dev --prefix ./tests/demo/func
            du -sh ./tests/demo/func/sk_render
            du -sh ./tests/demo/func

            # Standard Static directory
            du -sh ./tests/demo/build/static
          working-directory: '.'

      - uses: ./.github/actions/static-web-apps-deploy-wrapper
        id: build-deploy
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ steps.app-token.outputs.token }} # Used for Github integrations (i.e. PR comments)
          action: 'upload'
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: './tests/demo/build/static' # App source code path
          # api_location: './tests/demo/build/server' # Api source code path
          api_location: './tests/demo/func' # Api source code path - optional
          # output_location: '.' # Built app content directory - optional
          skip_app_build: true
          skip_api_build: true
          ###### End of Repository/Build Configurations ######

      - uses: kt-workflows/actions/npm-run-script@main
        with:
          node-version: ${{ matrix.node-version }}
          cache-reset: ${{ inputs.cache-reset }}
          install-script: ${{ needs.config.outputs.install-script }}
          # Run the build script and install the dependencies for the built api of the demo app
          # We build the app ourselves, otherwise the azure swa action will build it for us and it will take a very long time
          # For example: with build ourselves it takes about 1:30-2:00 minutes to build and deploy
          # With azure swa action it takes about 3:50 (or longer) minutes to build and deploy
          # Additionally, the azure swa action will occasionaly fail on determining the environment step (this step takes a long time)
          # Overall CI workflow reduced from about 5:00 minutes to about 2:30 minutes
          run-script: npm test --prefix ./tests/demo
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ steps.build-deploy.outputs.static_web_app_url }}

  # Stable aggregate required-* checks for branch protection rules.
  # This avoids depending directly on individual matrix job statuses.
  required-main:
    name: required-main
    needs:
      - cli
      - azure
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs for main
        shell: bash
        run: |
          echo "Required jobs for main are fulfilled"

  required-contribution:
    name: required-contribution
    needs:
      - cli
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs for contribution
        shell: bash
        run: |
          echo "Required jobs for contribution are fulfilled"
